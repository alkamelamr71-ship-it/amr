<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحلقة | عمرو بودكاست</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0A2342;
            color: #F5F0E8;
            direction: rtl;
            line-height: 1.7;
        }

        .container {
            width: 92%;
            max-width: 1200px;
            margin: auto;
        }

        /* Header */
        .header {
            background: rgba(10, 35, 66, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #E8DCCC;
        }

        .logo i {
            font-size: 2rem;
            color: #D4AF37;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .logo-sub {
            font-size: 0.8rem;
            color: #B0A8A0;
        }

        .episode-nav {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-secondary {
            background: rgba(212, 175, 55, 0.15);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-secondary:hover, .btn-outline:hover {
            background: rgba(212, 175, 55, 0.3);
            transform: translateY(-3px);
        }

        .btn-outline {
            background: transparent;
            color: #F5F0E8;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Video Player */
        .video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            margin: 40px 0;
            aspect-ratio: 16 / 9;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Episode Info */
        .episode-info {
            background: #1A334F;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .episode-info h1 {
            font-size: 1.8rem;
            color: #D4AF37;
            margin-bottom: 20px;
        }

        .episode-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 20px;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(10, 35, 66, 0.5);
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 0.9rem;
        }

        .meta-item i {
            color: #D4AF37;
        }

        /* Description */
        .episode-description {
            background: #1A334F;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 40px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .episode-description h3 {
            color: #D4AF37;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Similar Episodes */
        .similar-episodes {
            margin-bottom: 60px;
        }

        .similar-episodes h3 {
            color: #D4AF37;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .similar-card {
            background: #1A334F;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .similar-card:hover {
            transform: translateY(-5px);
            border-color: #D4AF37;
        }

        .similar-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .similar-card-content {
            padding: 15px;
        }

        .similar-card h4 {
            font-size: 1rem;
            margin-bottom: 8px;
            color: #F5F0E8;
        }

        .similar-card p {
            font-size: 0.8rem;
            color: #B0A8A0;
        }

        /* Loading & Empty States */
        .loading-state, .error-state {
            text-align: center;
            padding: 60px 20px;
        }

        .loading-state i, .error-state i {
            font-size: 3rem;
            color: #D4AF37;
            margin-bottom: 15px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .episode-nav {
                flex-direction: column;
                gap: 10px;
            }
            
            .episode-info h1 {
                font-size: 1.3rem;
            }
            
            .episode-meta {
                gap: 10px;
            }
            
            .meta-item {
                font-size: 0.75rem;
                padding: 5px 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <i class="fas fa-podcast"></i>
                    <div class="logo-text">
                        <span class="logo-main">عمرو بودكاست</span>
                        <span class="logo-sub">أفضل البودكاستات العربية</span>
                    </div>
                </a>
                <div class="episode-nav">
                    <a href="#" id="backToCategory" class="btn btn-secondary">
                        <i class="fas fa-arrow-right"></i> العودة للفئة
                    </a>
                    <a href="index.html" class="btn btn-outline">
                        <i class="fas fa-home"></i> الرئيسية
                    </a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="video-container" id="youtubePlayer">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري تحميل المشغل...</p>
                </div>
            </div>
            
            <div class="episode-info" id="episodeInfo">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري تحميل معلومات الحلقة...</p>
                </div>
            </div>
            
            <div class="episode-description" id="episodeDescription">
                <h3><i class="fas fa-align-right"></i> وصف الحلقة</h3>
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري تحميل الوصف...</p>
                </div>
            </div>
            
            <div class="similar-episodes">
                <h3><i class="fas fa-random"></i> حلقات مشابهة</h3>
                <div id="similarEpisodes" class="similar-grid">
                    <div class="loading-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>جاري تحميل الحلقات المشابهة...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="data.js"></script>
    <script>
        // استخراج المعرفات من الرابط
        function getEpisodeFromURL() {
            const params = new URLSearchParams(window.location.search);
            return {
                id: params.get('id'),
                category: params.get('cat')
            };
        }

        // تحميل معلومات الحلقة
        function loadEpisode() {
            const { id, category } = getEpisodeFromURL();
            
            if (!id || !category || !window.episodesData || !window.episodesData[category]) {
                showError();
                return;
            }
            
            const episode = window.episodesData[category].find(ep => ep.id === id);
            
            if (!episode) {
                showError();
                return;
            }
            
            displayEpisodeInfo(episode, category);
            loadYouTubePlayer(episode);
            loadSimilarEpisodes(category, id);
        }
        
        function showError() {
            const infoContainer = document.getElementById('episodeInfo');
            if (infoContainer) {
                infoContainer.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>لم يتم العثور على الحلقة</h3>
                        <p>عذراً، لا يمكن العثور على الحلقة المطلوبة</p>
                        <a href="index.html" class="btn btn-secondary" style="margin-top: 15px;">العودة للرئيسية</a>
                    </div>
                `;
            }
        }
        
        function displayEpisodeInfo(episode, category) {
            // تحديث معلومات الحلقة
            const infoContainer = document.getElementById('episodeInfo');
            if (infoContainer) {
                infoContainer.innerHTML = `
                    <h1>${episode.title}</h1>
                    <div class="episode-meta">
                        <div class="meta-item"><i class="fas fa-microphone"></i> ${episode.host || 'غير محدد'}</div>
                        ${episode.guest ? `<div class="meta-item"><i class="fas fa-user-friends"></i> ${episode.guest}</div>` : ''}
                        <div class="meta-item"><i class="fas fa-clock"></i> ${episode.duration || '--:--'}</div>
                        <div class="meta-item"><i class="fas fa-calendar"></i> ${episode.date || 'غير محدد'}</div>
                        <div class="meta-item"><i class="fas fa-eye"></i> ${episode.views || '0'}</div>
                        <div class="meta-item"><i class="fas fa-tag"></i> ${getCategoryName(category)}</div>
                    </div>
                `;
            }
            
            // تحديث وصف الحلقة
            const descContainer = document.getElementById('episodeDescription');
            if (descContainer) {
                descContainer.innerHTML = `
                    <h3><i class="fas fa-align-right"></i> وصف الحلقة</h3>
                    <p style="line-height: 1.8;">${episode.description || 'لا يوجد وصف لهذه الحلقة'}</p>
                `;
            }
            
            // تحديث رابط العودة للفئة
            const backBtn = document.getElementById('backToCategory');
            if (backBtn) {
                backBtn.href = `category.html?cat=${category}`;
            }
        }
        
        function loadYouTubePlayer(episode) {
            const container = document.getElementById('youtubePlayer');
            if (!container) return;
            
            const cleanId = extractYouTubeId(episode.youtube_id);
            if (!cleanId) {
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fab fa-youtube"></i>
                        <p>لا يمكن تشغيل هذا الفيديو</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${cleanId}?autoplay=1&modestbranding=1&rel=0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        title="${episode.title}"></iframe>
            `;
        }
        
        function loadSimilarEpisodes(category, currentId) {
            const container = document.getElementById('similarEpisodes');
            if (!container || !window.episodesData || !window.episodesData[category]) return;
            
            const episodes = window.episodesData[category]
                .filter(ep => ep.id !== currentId)
                .slice(0, 4);
            
            if (episodes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="text-align: center; padding: 40px;">
                        <p>لا توجد حلقات مشابهة</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            episodes.forEach(episode => {
                const cleanId = extractYouTubeId(episode.youtube_id);
                const thumbnail = cleanId ? `https://img.youtube.com/vi/${cleanId}/hqdefault.jpg` : 'https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=400&h=225&fit=crop';
                
                html += `
                    <div class="similar-card" onclick="window.location.href='episode.html?id=${episode.id}&cat=${category}'">
                        <img src="${thumbnail}" alt="${episode.title}" onerror="this.src='https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=400&h=225&fit=crop'">
                        <div class="similar-card-content">
                            <h4>${truncateText(episode.title, 60)}</h4>
                            <p><i class="fas fa-clock"></i> ${episode.duration || '--:--'}</p>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        function truncateText(text, maxLength) {
            if (!text) return '';
            return text.length > maxLength ? text.substring(0, maxLength) + '...' : text;
        }
        
        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            loadEpisode();
        });
    </script>
    <script src="player.js"></script>
    <script src="main.js"></script>
</body>
</html>
