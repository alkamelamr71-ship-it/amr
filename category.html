<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الفئة | عمرو بودكاست</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://www.youtube.com/iframe_api"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #0A2342;
            color: #F5F0E8;
            direction: rtl;
            line-height: 1.7;
            overflow-x: hidden;
        }

        .container {
            width: 92%;
            max-width: 1200px;
            margin: auto;
        }

        /* Header */
        .header {
            background: rgba(10, 35, 66, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            padding: 18px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: #E8DCCC;
        }

        .logo i {
            font-size: 2rem;
            color: #D4AF37;
        }

        .logo-text {
            display: flex;
            flex-direction: column;
        }

        .logo-main {
            font-weight: 800;
            font-size: 1.3rem;
        }

        .logo-sub {
            font-size: 0.8rem;
            color: #B0A8A0;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }

        .btn-secondary {
            background: rgba(212, 175, 55, 0.15);
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .btn-secondary:hover {
            background: rgba(212, 175, 55, 0.3);
            transform: translateY(-3px);
        }

        /* Category Header */
        .category-header {
            text-align: center;
            padding: 60px 0 40px;
        }

        .category-header h1 {
            font-size: 2.5rem;
            color: #D4AF37;
            margin-bottom: 15px;
        }

        .category-header p {
            font-size: 1.1rem;
            color: #B0A8A0;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            background: rgba(26, 51, 79, 0.5);
            padding: 20px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.2);
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #D4AF37;
        }

        .filter-group select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 12px;
            background: #1A334F;
            color: #F5F0E8;
            border: 1px solid rgba(212, 175, 55, 0.3);
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-group select:hover {
            border-color: #D4AF37;
        }

        /* Episodes Grid */
        .episodes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            margin-bottom: 60px;
        }

        /* تصميم بطاقة الحلقة المربعة */
        .episode-card {
            background: linear-gradient(135deg, #1A334F 0%, #0F2A42 100%);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(212, 175, 55, 0.2);
            position: relative;
            cursor: pointer;
            animation: fadeInUp 0.6s ease forwards;
        }

        .episode-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.4);
            border-color: #D4AF37;
        }

        .episode-card:active {
            transform: scale(0.98) translateY(-5px);
            transition: transform 0.1s ease;
        }

        /* صورة الحلقة */
        .episode-image {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .episode-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        .episode-card:hover .episode-image img {
            transform: scale(1.08);
        }

        /* طبقة داكنة فوق الصورة */
        .image-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10, 35, 66, 0.2), rgba(10, 35, 66, 0.7));
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .episode-card:hover .image-overlay {
            opacity: 0.4;
        }

        /* زر التشغيل الأنيق */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 65px;
            height: 65px;
            background: linear-gradient(135deg, #D4AF37, #FFD700);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0A2342;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            opacity: 0;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
            z-index: 5;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .episode-card:hover .play-button {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        .play-button:hover {
            transform: translate(-50%, -50%) scale(1.15);
            background: #FFD700;
            box-shadow: 0 0 35px rgba(212, 175, 55, 0.8);
        }

        .play-button:active {
            transform: translate(-50%, -50%) scale(0.95);
        }

        /* رقم الحلقة */
        .episode-number-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 45px;
            height: 45px;
            background: rgba(10, 35, 66, 0.85);
            backdrop-filter: blur(5px);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            color: #D4AF37;
            border: 1px solid rgba(212, 175, 55, 0.5);
            z-index: 4;
            transition: all 0.3s;
        }

        .episode-card:hover .episode-number-badge {
            background: #D4AF37;
            color: #0A2342;
            transform: scale(1.05);
        }

        /* المدة */
        .duration-badge {
            position: absolute;
            bottom: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            color: #D4AF37;
            display: flex;
            align-items: center;
            gap: 5px;
            z-index: 4;
        }

        .duration-badge i {
            font-size: 0.7rem;
        }

        /* محتوى الحلقة */
        .episode-content {
            padding: 20px;
        }

        .episode-title {
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 10px;
            color: #F5F0E8;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* معلومات الحلقة - بدون أيقونة المشاهدات */
        .episode-meta {
            display: flex;
            gap: 15px;
            font-size: 0.75rem;
            color: #B0A8A0;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .episode-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .episode-meta i {
            color: #D4AF37;
            font-size: 0.7rem;
        }

        .episode-description-short {
            font-size: 0.85rem;
            color: #B0A8A0;
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .episode-link {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 3;
        }

        /* Loading & Empty States */
        .loading-state, .empty-state {
            text-align: center;
            padding: 80px 20px;
            grid-column: span 2;
        }

        .loading-state i, .empty-state i {
            font-size: 3.5rem;
            color: #D4AF37;
            margin-bottom: 20px;
        }

        /* Modal for Video */
        .video-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(8px);
        }

        .video-modal.active {
            display: flex;
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            position: relative;
            animation: scaleIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-close {
            position: absolute;
            top: -50px;
            right: 0;
            background: none;
            border: none;
            color: white;
            font-size: 32px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            color: #D4AF37;
            transform: rotate(90deg);
        }

        .modal-video-container {
            background: #000;
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }

        .modal-video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .episodes-grid {
                grid-template-columns: 1fr;
            }
            
            .filters {
                flex-direction: column;
            }
            
            .category-header h1 {
                font-size: 1.8rem;
            }
            
            .play-button {
                width: 55px;
                height: 55px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <i class="fas fa-podcast"></i>
                    <div class="logo-text">
                        <span class="logo-main">عمرو بودكاست</span>
                        <span class="logo-sub">أفضل البودكاستات العربية</span>
                    </div>
                </a>
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-arrow-right"></i> العودة للرئيسية
                </a>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <div class="category-header" id="categoryHeader">
                <h1 id="categoryName">جاري التحميل...</h1>
                <p id="categoryDesc"></p>
            </div>

            <div class="filters">
                <div class="filter-group">
                    <label><i class="fas fa-sort"></i> ترتيب حسب</label>
                    <select id="sortBy">
                        <option value="newest">الأحدث</option>
                        <option value="oldest">الأقدم</option>
                        <option value="duration">المدة الأطول</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label><i class="fas fa-microphone"></i> المضيف</label>
                    <select id="filterHost">
                        <option value="all">جميع المضيفين</option>
                    </select>
                </div>
            </div>

            <div id="episodesContainer" class="episodes-grid">
                <div class="loading-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>جاري تحميل الحلقات...</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Video Modal -->
    <div id="videoModal" class="video-modal">
        <div class="modal-content">
            <button class="modal-close" id="closeModalBtn">&times;</button>
            <div id="modalVideoContainer" class="modal-video-container"></div>
        </div>
    </div>

    <script>
        // استخراج معرف الفئة من الرابط
        function getCategoryFromURL() {
            const params = new URLSearchParams(window.location.search);
            return params.get('cat');
        }

        // عرض معلومات الفئة
        function displayCategoryInfo(category) {
            const categoryNameElem = document.getElementById('categoryName');
            const categoryDescElem = document.getElementById('categoryDesc');
            
            if (categoryNameElem && typeof getCategoryName === 'function') {
                categoryNameElem.textContent = getCategoryName(category);
            }
            if (categoryDescElem && typeof getCategoryDescription === 'function') {
                categoryDescElem.textContent = getCategoryDescription(category);
            }
        }

        // تحميل الحلقات - بدون أيقونة المشاهدات
        function loadEpisodes(category) {
            const container = document.getElementById('episodesContainer');
            if (!container) return;
            
            if (!window.episodesData || !window.episodesData[category]) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-folder-open"></i>
                        <p>لا توجد حلقات في هذه الفئة</p>
                    </div>
                `;
                return;
            }
            
            let episodes = [...window.episodesData[category]];
            
            // تطبيق الفلاتر والترتيب
            const sortBy = document.getElementById('sortBy')?.value || 'newest';
            const hostFilter = document.getElementById('filterHost')?.value || 'all';
            
            if (hostFilter !== 'all') {
                episodes = episodes.filter(ep => ep.host === hostFilter);
            }
            
            if (sortBy === 'newest') {
                episodes.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (sortBy === 'oldest') {
                episodes.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (sortBy === 'duration') {
                episodes.sort((a, b) => {
                    const getMinutes = (dur) => {
                        const parts = (dur || '0:00').split(':');
                        return parseInt(parts[0]) * 60 + parseInt(parts[1] || 0);
                    };
                    return getMinutes(b.duration) - getMinutes(a.duration);
                });
            }
            
            if (episodes.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>لا توجد نتائج مطابقة</p>
                    </div>
                `;
                return;
            }
            
            let html = '';
            episodes.forEach((episode, index) => {
                const cleanId = typeof extractYouTubeId === 'function' ? extractYouTubeId(episode.youtube_id) : episode.youtube_id;
                const thumbnail = cleanId ? `https://img.youtube.com/vi/${cleanId}/mqdefault.jpg` : 'https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=400&h=225&fit=crop';
                
                html += `
                    <div class="episode-card" data-episode-id="${episode.id}" data-youtube-id="${episode.youtube_id}" data-title="${episode.title.replace(/"/g, '&quot;')}">
                        <div class="episode-image">
                            <img src="${thumbnail}" alt="${episode.title}" onerror="this.src='https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=400&h=225&fit=crop'">
                            <div class="image-overlay"></div>
                            <div class="episode-number-badge">${index + 1}</div>
                            <div class="duration-badge"><i class="fas fa-clock"></i> ${episode.duration || '--:--'}</div>
                            <div class="play-button">
                                <i class="fas fa-play"></i>
                            </div>
                        </div>
                        <div class="episode-content">
                            <h3 class="episode-title">${episode.title}</h3>
                            <div class="episode-meta">
                                <span><i class="fas fa-microphone"></i> ${episode.host || 'غير محدد'}</span>
                                <span><i class="fas fa-calendar"></i> ${episode.date || 'غير محدد'}</span>
                                <!-- تم إزالة أيقونة العين والمشاهدات -->
                            </div>
                            <p class="episode-description-short">${(episode.description || 'لا يوجد وصف').substring(0, 100)}${(episode.description || '').length > 100 ? '...' : ''}</p>
                        </div>
                        <a href="episode.html?id=${episode.id}&cat=${category}" class="episode-link"></a>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            
            // إضافة أحداث أزرار التشغيل
            document.querySelectorAll('.play-button').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const card = this.closest('.episode-card');
                    const youtubeId = card?.getAttribute('data-youtube-id');
                    const title = card?.getAttribute('data-title');
                    if (youtubeId) {
                        playEpisodeInline(youtubeId, title);
                    }
                });
            });
        }

        // تحديث قائمة المضيفين
        function updateHostsFilter(category) {
            const hostSelect = document.getElementById('filterHost');
            if (!hostSelect || !window.episodesData || !window.episodesData[category]) return;
            
            const hosts = [...new Set(window.episodesData[category].map(ep => ep.host).filter(h => h))];
            
            let options = '<option value="all">جميع المضيفين</option>';
            hosts.forEach(host => {
                options += `<option value="${host}">${host}</option>`;
            });
            
            hostSelect.innerHTML = options;
        }

        // إعداد الفلاتر
        function setupFilters(category) {
            const sortSelect = document.getElementById('sortBy');
            const hostSelect = document.getElementById('filterHost');
            
            if (sortSelect) {
                sortSelect.addEventListener('change', () => loadEpisodes(category));
            }
            if (hostSelect) {
                hostSelect.addEventListener('change', () => loadEpisodes(category));
            }
        }

        // مشغل الفيديو المنبثق
        function playEpisodeInline(youtubeId, title) {
            if (!youtubeId) return;
            
            const cleanId = typeof extractYouTubeId === 'function' ? extractYouTubeId(youtubeId) : youtubeId;
            const modal = document.getElementById('videoModal');
            const container = document.getElementById('modalVideoContainer');
            
            if (!modal || !container) return;
            
            container.innerHTML = `
                <iframe src="https://www.youtube.com/embed/${cleanId}?autoplay=1&modestbranding=1&rel=0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                        allowfullscreen
                        title="${title || 'تشغيل الحلقة'}"></iframe>
            `;
            
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // إغلاق المودال
        function closeVideoModal() {
            const modal = document.getElementById('videoModal');
            const container = document.getElementById('modalVideoContainer');
            if (modal) modal.classList.remove('active');
            if (container) container.innerHTML = '';
            document.body.style.overflow = '';
        }

        // تهيئة الصفحة
        document.addEventListener('DOMContentLoaded', function() {
            const category = getCategoryFromURL();
            
            if (!category) {
                window.location.href = 'index.html';
                return;
            }
            
            // انتظار تحميل البيانات
            const checkData = setInterval(() => {
                if (window.episodesData) {
                    clearInterval(checkData);
                    displayCategoryInfo(category);
                    updateHostsFilter(category);
                    setupFilters(category);
                    loadEpisodes(category);
                }
            }, 100);
            
            // إغلاق المودال
            const closeBtn = document.getElementById('closeModalBtn');
            const modal = document.getElementById('videoModal');
            
            if (closeBtn) {
                closeBtn.addEventListener('click', closeVideoModal);
            }
            if (modal) {
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) closeVideoModal();
                });
            }
        });
    </script>
    </script><script src="main.js"></script>
      </script><script src="player.js"></script>

</body>
</html>
